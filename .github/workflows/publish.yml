name: Publish Mod

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Detect secondary loader module
        id: loader
        shell: bash
        run: |
          set -euo pipefail
          if grep -E "include\\(['\"]neoforge['\"]\\)" settings.gradle >/dev/null; then
            echo "module=neoforge" >> "$GITHUB_OUTPUT"
            echo "loader=neoforge" >> "$GITHUB_OUTPUT"
          elif grep -E "include\\(['\"]forge['\"]\\)" settings.gradle >/dev/null; then
            echo "module=forge" >> "$GITHUB_OUTPUT"
            echo "loader=forge" >> "$GITHUB_OUTPUT"
          else
            echo "module=" >> "$GITHUB_OUTPUT"
            echo "loader=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run data generation
        env:
          SECONDARY_MODULE: ${{ steps.loader.outputs.module }}
        run: |
          set -euo pipefail
          if [ -n "${SECONDARY_MODULE}" ]; then
            ./gradlew :fabric:runDatagen :${SECONDARY_MODULE}:runData --no-daemon
          else
            ./gradlew :fabric:runDatagen --no-daemon
          fi

      - name: Build with Gradle
        env:
          SECONDARY_MODULE: ${{ steps.loader.outputs.module }}
        run: |
          set -euo pipefail
          if [ -n "${SECONDARY_MODULE}" ]; then
            ./gradlew :fabric:build :${SECONDARY_MODULE}:build --no-daemon
          else
            ./gradlew :fabric:build --no-daemon
          fi

      - name: Prepare publish metadata
        id: meta
        shell: bash
        env:
          SECONDARY_MODULE: ${{ steps.loader.outputs.module }}
          SECONDARY_LOADER: ${{ steps.loader.outputs.loader }}
        run: |
          set -euo pipefail
          read_prop() {
            local key="$1"
            grep -E "^${key}=" gradle.properties | head -n1 | cut -d= -f2-
          }

          mod_id="$(read_prop mod_id)"
          mod_version="$(read_prop version)"
          minecraft_version="$(read_prop minecraft_version)"

          if [ -z "${mod_id}" ] || [ -z "${mod_version}" ] || [ -z "${minecraft_version}" ]; then
            echo "Failed to read required properties from gradle.properties"
            exit 1
          fi

          channel="release"
          if [[ "${GITHUB_REF_NAME}" == *"-alpha"* ]]; then
            channel="alpha"
          elif [[ "${GITHUB_REF_NAME}" == *"-beta"* ]]; then
            channel="beta"
          fi

          prerelease="false"
          if [ "${channel}" != "release" ]; then
            prerelease="true"
          fi

          find_loader_jar() {
            local module="$1"
            if [ -z "${module}" ] || [ ! -d "${module}/build/libs" ]; then
              return 0
            fi
            find "${module}/build/libs" -maxdepth 1 -type f -name '*.jar' \
              ! -name '*-sources.jar' ! -name '*-javadoc.jar' ! -name '*-dev.jar' \
              | LC_ALL=C sort | head -n1
          }

          fabric_file="$(find_loader_jar fabric)"
          secondary_file="$(find_loader_jar "${SECONDARY_MODULE:-}")"

          if [ -z "${fabric_file}" ] && [ -z "${secondary_file}" ]; then
            echo "No publishable loader jars found"
            exit 1
          fi

          fabric_name="${mod_id}-${mod_version}-${channel}-fabric-${minecraft_version}"
          secondary_name=""
          fabric_version_base="${mod_version}-${channel}-fabric-${minecraft_version}"
          secondary_version_base=""

          if [ -n "${secondary_file}" ] && [ -n "${SECONDARY_LOADER:-}" ]; then
            secondary_name="${mod_id}-${mod_version}-${channel}-${SECONDARY_LOADER}-${minecraft_version}"
            secondary_version_base="${mod_version}-${channel}-${SECONDARY_LOADER}-${minecraft_version}"
          fi

          # Modrinth version_number has a strict length limit; keep deterministic uniqueness if truncated.
          make_version_number() {
            local base="$1"
            local max_len=32
            if [ "${#base}" -le "${max_len}" ]; then
              echo "${base}"
              return 0
            fi
            local hash
            hash="$(printf '%s' "${base}" | sha1sum | cut -c1-6)"
            local keep_len=$((max_len - 1 - ${#hash}))
            echo "${base:0:${keep_len}}-${hash}"
          }

          fabric_version="$(make_version_number "${fabric_version_base}")"
          secondary_version=""
          if [ -n "${secondary_version_base}" ]; then
            secondary_version="$(make_version_number "${secondary_version_base}")"
          fi

          {
            echo "version_type=${channel}"
            echo "github_prerelease=${prerelease}"
            echo "minecraft_version=${minecraft_version}"
            echo "fabric_file=${fabric_file}"
            echo "secondary_file=${secondary_file}"
            echo "secondary_loader=${SECONDARY_LOADER:-}"
            echo "fabric_name=${fabric_name}"
            echo "secondary_name=${secondary_name}"
            echo "fabric_version=${fabric_version}"
            echo "secondary_version=${secondary_version}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish Fabric to Modrinth and CurseForge
        if: ${{ steps.meta.outputs.fabric_file != '' }}
        uses: Kira-NT/mc-publish@v3.3.0
        with:
          files: ${{ steps.meta.outputs.fabric_file }}
          loaders: fabric
          name: ${{ steps.meta.outputs.fabric_name }}
          version: ${{ steps.meta.outputs.fabric_version }}
          game-versions: ${{ steps.meta.outputs.minecraft_version }}
          game-version-filter: none
          version-type: ${{ steps.meta.outputs.version_type }}
          github-prerelease: ${{ steps.meta.outputs.github_prerelease }}
          dependencies: |
            geckolib(embedded)

          curseforge-id: 1106419
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          modrinth-id: pT971QUb
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Secondary Loader to Modrinth and CurseForge
        if: ${{ steps.meta.outputs.secondary_file != '' && steps.meta.outputs.secondary_loader != '' }}
        uses: Kira-NT/mc-publish@v3.3.0
        with:
          files: ${{ steps.meta.outputs.secondary_file }}
          loaders: ${{ steps.meta.outputs.secondary_loader }}
          name: ${{ steps.meta.outputs.secondary_name }}
          version: ${{ steps.meta.outputs.secondary_version }}
          game-versions: ${{ steps.meta.outputs.minecraft_version }}
          game-version-filter: none
          version-type: ${{ steps.meta.outputs.version_type }}
          github-prerelease: ${{ steps.meta.outputs.github_prerelease }}
          dependencies: |
            geckolib(embedded)

          curseforge-id: 1106419
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          modrinth-id: pT971QUb
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          github-token: ${{ secrets.GITHUB_TOKEN }}
